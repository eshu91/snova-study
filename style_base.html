<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
:root{
  --ink:#1c1a17;--ink2:#6b6560;--ink3:#a89f95;
  --bg:#f5f3ef;--surface:#faf9f7;--surface2:#f0ede8;
  --border:#e2ddd7;--border2:#ccc8c1;
  --accent:#2d5016;--accent2:#4a7a25;--accent3:#6ea63a;
  --accent-bg:#ebf4e2;--accent-light:#d4ebbf;
  --gold:#9e6d1e;--gold-bg:#fdf4e3;--gold-border:#e8c97a;--gold-light:#fceac4;
  --blue:#1a4580;--blue2:#2d6bcc;--blue-bg:#e6f0fb;--blue-border:#aac8f0;
  --red:#8c2020;--red2:#c04040;--red-bg:#fbeaea;--red-border:#f0b8b8;
  --purple:#4a2080;--purple-bg:#f0eafa;--purple-border:#c8a8f0;
  --teal:#0e6b6b;--teal-bg:#e3f5f5;--teal-border:#8fd4d4;
  --sidebar-w:240px;--radius:10px;--radius-lg:14px;--radius-xl:20px;
  font-family:'DM Sans',system-ui,sans-serif;font-size:15px;line-height:1.5;color:var(--ink)
}
body{background:var(--bg);display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);height:100vh;position:fixed;top:0;left:0;background:var(--surface);border-right:0.5px solid var(--border2);display:flex;flex-direction:column;z-index:200;overflow:hidden}
.sb-top{padding:20px 18px 0}
.sb-wordmark{font-family:'DM Serif Display',serif;font-size:19px;color:var(--accent);letter-spacing:-.3px;line-height:1}
.sb-wordmark em{color:var(--ink3);font-style:italic}
.sb-sub{font-size:10px;color:var(--ink3);margin-top:3px}
.workspace-switcher{margin:14px 0 0;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:0;overflow:hidden}
.ws-current{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;transition:background .12s}
.ws-current:hover{background:var(--border)}
.ws-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ws-name{font-size:13px;font-weight:500;flex:1}
.ws-arrow{font-size:10px;color:var(--ink3);transition:transform .2s}
.ws-arrow.open{transform:rotate(180deg)}
.ws-dropdown{display:none;border-top:0.5px solid var(--border)}
.ws-dropdown.open{display:block}
.ws-option{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;font-size:12px;color:var(--ink2);transition:background .1s}
.ws-option:hover{background:var(--surface2)}
.ws-option.active{color:var(--accent);font-weight:500}
.ws-opt-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.ws-add{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;font-size:12px;color:var(--ink3);border-top:0.5px solid var(--border);transition:background .1s}
.ws-add:hover{background:var(--surface2);color:var(--accent)}
.sb-user{padding:14px 18px;border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:9px;margin-top:10px}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--accent-bg);border:1.5px solid var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--accent);flex-shrink:0}
.user-name{font-size:12px;font-weight:500}
.user-role{font-size:10px;color:var(--ink3)}
.streak-badge{margin-left:auto;background:var(--gold-bg);border:0.5px solid var(--gold-border);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--gold);font-weight:500;white-space:nowrap}
.sb-nav{flex:1;padding:12px 12px 0;overflow-y:auto}
.nav-section{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;padding:0 8px;margin:12px 0 5px}
.nav-section:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--ink2);font-size:13px;font-weight:400;border:none;background:none;width:100%;font-family:inherit;transition:background .12s,color .12s;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--ink)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav-ic{width:17px;height:17px;opacity:.65;flex-shrink:0}
.nav-item.active .nav-ic{opacity:1}
.nav-badge{margin-left:auto;border-radius:20px;padding:1px 7px;font-size:10px}
.nb-gold{background:var(--gold-bg);border:0.5px solid var(--gold-border);color:var(--gold)}
.nb-red{background:var(--red-bg);border:0.5px solid var(--red-border);color:var(--red)}
.sb-search-btn{margin:8px 12px 0;display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:12px;color:var(--ink3);transition:all .12s;width:calc(100% - 24px)}
.sb-search-btn:hover{background:var(--border);color:var(--ink2)}
.sb-search-kbd{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--surface);border:0.5px solid var(--border2);border-radius:4px;padding:1px 5px;color:var(--ink3)}
.sb-bottom{padding:14px;border-top:0.5px solid var(--border)}
.phase-pill{display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--accent-bg);border:0.5px solid var(--accent-light);border-radius:var(--radius);margin-bottom:8px}
.phase-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);box-shadow:0 0 0 2px var(--accent-light);flex-shrink:0}
.phase-text{font-size:11px;font-weight:500;color:var(--accent)}
.phase-sub{font-size:10px;color:var(--accent);opacity:.65}
.countdown-block{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--blue-bg);border:0.5px solid var(--blue-border);border-radius:var(--radius)}
.cd-num{font-family:'DM Serif Display',serif;font-size:28px;color:var(--blue);line-height:1}
.cd-label{font-size:10px;color:var(--blue);line-height:1.4}
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;padding:30px 34px 60px;max-width:calc(100vw - var(--sidebar-w))}
.page{display:none}
.page.active{display:block}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:26px;gap:16px}
.page-title{font-family:'DM Serif Display',serif;font-size:28px;letter-spacing:-.5px;line-height:1}
.page-sub{font-size:13px;color:var(--ink3);margin-top:4px}
.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:18px 20px}
.card--flat{background:var(--surface2);border-color:var(--border)}
.card--gold{background:var(--gold-bg);border-color:var(--gold-border)}
.card--blue{background:var(--blue-bg);border-color:var(--blue-border)}
.card--green{background:var(--accent-bg);border-color:var(--accent-light)}
.card--purple{background:var(--purple-bg);border-color:var(--purple-border)}
.card--teal{background:var(--teal-bg);border-color:var(--teal-border)}
.sec-label{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin:20px 0 8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.gcols-6040{display:grid;grid-template-columns:1.35fr 1fr;gap:22px;align-items:start}
.gcols-5050{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
.gcols-7030{display:grid;grid-template-columns:2fr 1fr;gap:22px;align-items:start}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:0.5px solid transparent}
.pill--ns{background:var(--surface2);color:var(--ink3);border-color:var(--border2)}
.pill--l{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
.pill--m{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-light)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot--g{background:var(--accent2)}.dot--b{background:var(--blue2)}.dot--y{background:var(--gold)}.dot--gray{background:var(--border2)}.dot--p{background:var(--purple)}.dot--t{background:var(--teal)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:38px;padding:0 18px;border-radius:var(--radius);border:none;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:filter .12s,transform .08s}
.btn:active{transform:scale(.97)}
.btn--primary{background:var(--accent);color:#fff}.btn--primary:hover{filter:brightness(1.1)}
.btn--danger{background:var(--red);color:#fff}
.btn--ghost{background:none;border:0.5px solid var(--border2);color:var(--ink2)}.btn--ghost:hover{background:var(--surface2)}
.btn--blue{background:var(--blue);color:#fff}
.btn--sm{height:32px;padding:0 14px;font-size:12px}
.btn--full{width:100%}
.field{margin-bottom:13px}
.fl{display:block;font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
select,input[type=text],input[type=email],input[type=date],textarea{width:100%;height:38px;padding:0 12px;border:0.5px solid var(--border2);border-radius:var(--radius);font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface2);outline:none;transition:border-color .12s,background .12s}
select:focus,input:focus,textarea:focus{border-color:var(--accent2);background:var(--surface)}
textarea{height:64px;padding:10px 12px;resize:none}
.chip{padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:none;font-family:inherit;font-size:12px;color:var(--ink2);cursor:pointer;transition:all .12s}
.chip.active,.chip:hover{background:var(--accent-bg);border-color:var(--accent2);color:var(--accent)}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.sb{background:var(--surface2);border-radius:var(--radius);padding:13px 15px}
.sb-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.sb-val{font-family:'DM Serif Display',serif;font-size:30px;letter-spacing:-.5px;line-height:1.1;margin-top:3px}
.sb-unit{font-size:11px;color:var(--ink3);margin-top:2px}
.greeting-line{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.3px}
.greeting-sub{font-size:13px;color:var(--ink3);margin-bottom:4px}
.timer-card{position:relative;overflow:hidden}
.timer-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent2),var(--gold));opacity:0;transition:opacity .3s}
.timer-card.running::before{opacity:1}
.timer-display{font-family:'JetBrains Mono',monospace;font-size:62px;font-weight:400;letter-spacing:-4px;line-height:1;text-align:center;padding:10px 0;color:var(--ink)}
.timer-display .sep{color:var(--ink3)}
.timer-idle-hint{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;text-align:center;margin-bottom:14px}
.timer-track-label{display:inline-flex;align-items:center;gap:7px;background:var(--accent-bg);border:0.5px solid var(--accent-light);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;color:var(--accent)}
.cancel-link{font-size:12px;color:var(--ink3);cursor:pointer;text-decoration:underline;text-underline-offset:2px;background:none;border:none;font-family:inherit;padding:0}
.stype-row{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.stype-btn{padding:4px 11px;border-radius:20px;border:0.5px solid var(--border2);background:none;font-size:11px;font-family:inherit;color:var(--ink2);cursor:pointer;transition:all .12s}
.stype-btn.active{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue);font-weight:500}
.quality-row{display:flex;gap:6px;align-items:center;justify-content:center;margin:10px 0 14px}
.qstar{font-size:22px;cursor:pointer;opacity:.3;transition:opacity .12s,transform .1s}
.qstar.active,.qstar:hover{opacity:1;transform:scale(1.1)}
.goal-bar-wrap{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:7px}
.goal-bar-fill{height:100%;border-radius:3px;background:var(--accent2);transition:width .4s ease}
.sess-row{display:flex;align-items:flex-start;gap:11px;padding:10px 16px;border-top:0.5px solid var(--border)}
.sess-row
.sess-track{font-size:13px;font-weight:500}
.sess-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.sess-type-badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;background:var(--blue-bg);color:var(--blue2);border:0.5px solid var(--blue-border)}
.quality-dots{display:flex;gap:2px;margin-top:3px}
.qdot{width:6px;height:6px;border-radius:50%;background:var(--border2)}
.qdot.on{background:var(--gold)}
.level-tabs{display:flex;gap:5px;flex-wrap:wrap}
.ltab{padding:5px 14px;border-radius:20px;font-size:12px;border:0.5px solid var(--border2);background:none;cursor:pointer;font-family:inherit;color:var(--ink2);transition:all .12s}
.ltab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ltab.dim{opacity:.4}
.ltab:hover:not(.active){background:var(--surface2)}
.syl-toolbar{display:flex;gap:10px;align-items:center;margin:16px 0 10px}
.syl-search{flex:1}
.topic-group-lbl{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin:14px 0 5px;padding:0 2px}
.topic-card{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:0.5px solid var(--border);background:var(--surface);cursor:pointer;transition:background .1s}
.topic-card
.topic-card:hover{background:var(--surface2)}
.topic-name{flex:1;font-size:13px;color:var(--ink)}
.topic-time{font-size:11px;color:var(--ink3);margin-right:6px}
.topic-resource-dot{width:6px;height:6px;border-radius:50%;background:var(--blue2);flex-shrink:0}
.dep-warn{font-size:10px;color:var(--gold);background:var(--gold-bg);border:0.5px solid var(--gold-border);border-radius:20px;padding:1px 7px;white-space:nowrap}
.prog-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:2px}
.heatmap-wrap{display:flex;gap:3px;flex-wrap:wrap}
.hm-cell{width:11px;height:11px;border-radius:2px;background:var(--surface2);cursor:default;flex-shrink:0}
.hm-cell:hover{outline:1px solid var(--border2)}
.hm-0{background:var(--surface2)}.hm-1{background:#c8e6a0}.hm-2{background:#8dcf52}.hm-3{background:#5baa1e}.hm-4{background:#2d5016}
.chart-container{display:flex;align-items:flex-end;gap:4px;height:100px;padding:0 2px}
.bar-grp{display:flex;gap:2px;align-items:flex-end;flex:1}
.bar{border-radius:3px 3px 0 0;flex:1;min-height:3px}
.bar--g{background:var(--accent2)}.bar--b{background:var(--blue2)}
.chart-labels{display:flex;gap:4px;margin-top:6px}
.chart-lbl{flex:1;text-align:center;font-size:9px;color:var(--ink3)}
.legend-row{display:flex;gap:14px;margin-top:9px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3)}
.leg-dot{width:9px;height:9px;border-radius:2px}
.mb-wrap{display:flex;align-items:flex-end;gap:7px;height:70px;padding:0 2px}
.mb-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.mb-bar{width:100%;border-radius:3px 3px 0 0;background:var(--accent2)}
.mb-lbl{font-size:9px;color:var(--ink3)}
.sparkline{display:flex;align-items:flex-end;gap:1px;height:20px}
.sp-bar{width:4px;border-radius:1px 1px 0 0;background:var(--accent2);min-height:2px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-top:0.5px solid var(--border);gap:16px}
.settings-row
.srow-lbl{font-size:13px;color:var(--ink)}
.srow-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.srow-in{width:180px;height:32px;font-size:12px}
.srow-sel{width:140px;height:32px;font-size:12px}
.phase-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);cursor:pointer;margin-bottom:7px;transition:all .12s}
.phase-opt.active{border-color:var(--accent2);background:var(--accent-bg)}
.popt-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .12s}
.phase-opt.active .popt-dot{background:var(--accent2)}
.popt-lbl{font-size:13px;font-weight:500}
.popt-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.trigger-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-top:0.5px solid var(--border);font-size:12px}
.trigger-row
.tr-name{font-weight:500;flex:1}
.tr-time{font-size:11px;color:var(--ink3)}
.badge{padding:2px 8px;border-radius:20px;font-size:10px}
.badge-ok{background:var(--accent-bg);color:var(--accent)}
.badge-sent{background:var(--blue-bg);color:var(--blue)}
.badge-skip{background:var(--surface2);color:var(--ink3)}
.badge-warn{background:var(--gold-bg);color:var(--gold)}
.export-option{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-top:0.5px solid var(--border);gap:12px}
.export-option
.export-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--surface2);flex-shrink:0}
.review-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:0.5px solid var(--border);cursor:pointer;transition:background .1s}
.review-item
.review-item:hover{background:var(--surface2)}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:flex-end;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:20px 22px 32px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto}
.modal-handle{width:34px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:18px}
.modal-footer{display:flex;gap:10px;margin-top:16px}
.search-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:600;align-items:flex-start;justify-content:center;padding-top:80px}
.search-modal-backdrop.open{display:flex}
.search-modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:560px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.14)}
.search-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:0.5px solid var(--border)}
.search-icon{font-size:16px;color:var(--ink3);flex-shrink:0}
.search-input{border:none;background:none;font-size:15px;color:var(--ink);outline:none;width:100%;font-family:inherit}
.search-result{display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;transition:background .1s}
.search-result:hover{background:var(--surface2)}
.search-result-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.search-result-name{font-size:13px;font-weight:500}
.search-result-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.search-section-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;padding:10px 18px 4px}
.offline-bar{display:none;position:fixed;top:0;left:0;right:0;background:var(--gold-bg);border-bottom:0.5px solid var(--gold-border);padding:6px 20px;font-size:12px;color:var(--gold);text-align:center;z-index:999}
#toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column-reverse;gap:8px;z-index:9999;pointer-events:none}
.toast{padding:9px 16px;background:var(--ink);color:#fff;border-radius:var(--radius-xl);font-size:13px;opacity:0;animation:tin .2s ease forwards,tout .25s ease 2.6s forwards}
@keyframes tin{to{opacity:1;transform:translateY(0)}from{opacity:0;transform:translateY(8px)}}
@keyframes tout{to{opacity:0}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
@media(max-width:900px){
.gcols-6040,.gcols-5050,.gcols-7030{grid-template-columns:1fr}
.g4,.g5{grid-template-columns:1fr 1fr}
.vocab-input-row{flex-direction:column}
  .vocab-input-row .field:last-of-type{max-width:100%}
  .word-meaning-preview{display:none}
