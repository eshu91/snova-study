<script>
// ── Navigation ────────────────────────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
  var p = document.getElementById('page-' + id);
  if (p) p.classList.add('active');
  if (btn) btn.classList.add('active');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  var c = document.getElementById('toasts');
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.remove(); }, 3400);
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openModal(id) {
  closeModals();
  var m = document.getElementById(id);
  if (m) m.classList.add('open');
}
function closeModals() {
  document.querySelectorAll('.modal-backdrop').forEach(function(m) { m.classList.remove('open'); });
}
document.querySelectorAll('.modal-backdrop').forEach(function(m) {
  m.addEventListener('click', function(e) { if (e.target === m) closeModals(); });
});

// ── Search ────────────────────────────────────────────────────────────────────
var _searchTimer = null;

function openSearch() {
  document.getElementById('search-modal').classList.add('open');
  document.getElementById('search-inp').value = '';
  document.getElementById('search-results').innerHTML = _searchDefault_();
  setTimeout(function() { document.getElementById('search-inp').focus(); }, 50);
}

function closeSearch(e) {
  if (e && e.target !== document.getElementById('search-modal')) return;
  clearTimeout(_searchTimer);
  document.getElementById('search-modal').classList.remove('open');
  document.getElementById('search-inp').value = '';
  document.getElementById('search-results').innerHTML = _searchDefault_();
}

function doSearch(q) {
  clearTimeout(_searchTimer);
  var results = document.getElementById('search-results');

  if (!q || q.trim().length < 2) {
    results.innerHTML = _searchDefault_();
    return;
  }

  results.innerHTML = '<div style="padding:14px 18px;font-size:12px;color:var(--ink3)">Searching\u2026</div>';

  _searchTimer = setTimeout(async function() {
    try {
      var items = await api.call('searchTopics', q.trim());
      var html = '';
      if (items && items.length > 0) {
        html += '<div class="search-section-lbl">Topics (' + items.length + ')</div>';
        items.forEach(function(t) {
          var levelLabel = t.level === 'IELTS' ? 'IELTS' : 'German ' + t.level;
          var pillCls = ({ 'Not started':'pill--ns','Learning':'pill--l','Mastered':'pill--m' })[t.status] || 'pill--ns';
          var dotCls  = ({ 'Not started':'dot--gray','Learning':'dot--y','Mastered':'dot--g' })[t.status] || 'dot--gray';
          var safeLevel = t.level.replace(/'/g, "\\'");
          html += '<div class="search-result" onclick="closeSearch();showPage(\'syllabus\',document.getElementById(\'nav-syllabus\'));sylLoad(\'' + safeLevel + '\')">' +
            '<div class="search-result-icon" style="background:var(--surface2)"><span class="dot ' + dotCls + '" style="width:10px;height:10px"></span></div>' +
            '<div style="flex:1;min-width:0"><div class="search-result-name">' + escHtml(t.topic) + '</div>' +
            '<div style="display:flex;align-items:center;gap:6px;margin-top:3px"><span style="font-size:10px;color:var(--ink3)">' + escHtml(levelLabel) + '</span>' +
            '<span class="pill ' + pillCls + '" style="font-size:10px;padding:1px 6px">' + t.status + '</span></div></div></div>';
        });
      }
      // Also search vocab words
      try {
        var vocabItems = await api.call('searchVocab', q.trim());
        if (vocabItems && vocabItems.length > 0) {
          html += '<div class="search-section-lbl">Vocab (' + vocabItems.length + ')</div>';
          vocabItems.forEach(function(v) {
            var dotCls = v.track.indexOf('German') === 0 ? 'dot--g' : 'dot--b';
            html += '<div class="search-result" onclick="closeSearch();showPage(\'vocab\',document.getElementById(\'nav-vocab\'))">' +
              '<div class="search-result-icon" style="background:var(--teal-bg)"><span class="dot ' + dotCls + '" style="width:10px;height:10px"></span></div>' +
              '<div style="flex:1;min-width:0"><div class="search-result-name">' + escHtml(v.word) + '</div>' +
              '<div style="font-size:11px;color:var(--ink3);margin-top:2px">' + escHtml((v.meaning||'').slice(0,50)) + '</div></div></div>';
          });
        }
      } catch (e) { /* vocab search optional */ }

      if (!html) {
        html = '<div style="padding:24px 18px;text-align:center;font-size:13px;color:var(--ink3)">' +
          'Nothing found for \u201c<strong>' + escHtml(q) + '</strong>\u201d</div>';
      }
      results.innerHTML = html;
    } catch (e) {
      results.innerHTML = '<div style="padding:14px 18px;font-size:12px;color:var(--red2)">Error: ' + escHtml(e.message) + '</div>';
    }


  }, 300);
}

function _searchDefault_() {
  return '<div class="search-section-lbl">Quick actions</div>' +
    '<div class="search-result" onclick="closeSearch();showPage(\'today\',document.getElementById(\'nav-today\'))">' +
      '<div class="search-result-icon" style="background:var(--accent-bg)">📖</div>' +
      '<div><div class="search-result-name">Start a study session</div><div class="search-result-sub">Today \u2192 timer</div></div></div>' +
    '<div class="search-result" onclick="closeSearch();openModal(\'modal-backfill\')">' +
      '<div class="search-result-icon" style="background:var(--surface2)">⏪</div>' +
      '<div><div class="search-result-name">Log a past session</div><div class="search-result-sub">Backfill a session you forgot to track</div></div></div>' +
    '<div class="search-result" onclick="closeSearch();showPage(\'syllabus\',document.getElementById(\'nav-syllabus\'));openNewTopicModal()">' +
      '<div class="search-result-icon" style="background:var(--surface2)">➕</div>' +
      '<div><div class="search-result-name">Add a new topic</div><div class="search-result-sub">Open topic creator</div></div></div>' +
    '<div class="search-result" onclick="closeSearch();showPage(\'vocab\',document.getElementById(\'nav-vocab\'))">' +
      '<div class="search-result-icon" style="background:var(--teal-bg)">📝</div>' +
      '<div><div class="search-result-name">Add a vocab word</div><div class="search-result-sub">Vocab \u2192 add + AI enrich</div></div></div>' +
    '<div class="search-result" onclick="closeSearch();showPage(\'stats\',document.getElementById(\'nav-stats\'))">' +
      '<div class="search-result-icon" style="background:var(--gold-bg)">📊</div>' +
      '<div><div class="search-result-name">View stats</div><div class="search-result-sub">Study summary and progress</div></div></div>' +
    '<div style="padding:10px 18px 6px;font-size:11px;color:var(--ink3)">Type 2+ characters to search topics across all levels</div>';
}

document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape') { closeModals(); closeSearch(); }
});

// ── Workspace switcher ────────────────────────────────────────────────────────
var WORKSPACE_TRACKS = {
  German: ['German A1', 'German A2', 'German B1', 'German B2'],
  IELTS:  ['IELTS Reading', 'IELTS Writing', 'IELTS Listening', 'IELTS Speaking', 'IELTS Mock']
};

var WORKSPACE_DEFAULT_LEVEL = { German: 'A1', IELTS: 'IELTS' };

window._activeWorkspace = 'German';

function toggleWsDropdown() {
  document.getElementById('ws-dropdown').classList.toggle('open');
  document.getElementById('ws-arrow').classList.toggle('open');
}

function switchWorkspace(el, name, icon, bg) {
  window._activeWorkspace = name;

  document.querySelectorAll('.ws-option').forEach(function(o) { o.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('ws-current-name').textContent = name;
  var ic = document.querySelector('.ws-current .ws-icon');
  if (ic) { ic.textContent = icon; ic.style.background = bg; }
  document.getElementById('ws-dropdown').classList.remove('open');
  document.getElementById('ws-arrow').classList.remove('open');

  _updateTrackDropdown(name);

  var level = WORKSPACE_DEFAULT_LEVEL[name];
  if (level && document.getElementById('page-syllabus').classList.contains('active')) {
    if (typeof sylLoad === 'function') sylLoad(level);
  }
  // Update vocab track dropdown when workspace changes
// Update vocab page when workspace changes
  if (typeof vocabUpdateTrackDropdown === 'function') {
    vocabUpdateTrackDropdown();
    if (document.getElementById('page-vocab').classList.contains('active')) {
      vocabLoadRecent();
    }
  }

  if (!WORKSPACE_TRACKS[name]) showToast(name + ' \u2014 coming soon');
}

function _updateTrackDropdown(workspace) {
  var sel    = document.getElementById('track-sel');
  var tracks = WORKSPACE_TRACKS[workspace];
  if (!sel || !tracks) return;

  var chips = document.getElementById('topic-chips');
  if (chips) chips.innerHTML = '<span style="font-size:12px;color:var(--ink3)">Select a track first</span>';

  sel.innerHTML = '<option value="">\u2014 select a track \u2014</option>' +
    tracks.map(function(t) { return '<option>' + t + '</option>'; }).join('');
  sel.value = '';
}

// ── Timer ─────────────────────────────────────────────────────────────────────
var TOPIC_CHIPS = {
  'German A1':       ['Gender of nouns','Modal verbs','Negation: nicht/kein','Present tense','Personal pronouns'],
  'German A2':       ['Perfekt tense','Dative case','Reflexive verbs','Subordinate clauses'],
  'German B1':       ['Passive voice','Relative clauses','Infinitive constructions','Plusquamperfekt'],
  'German B2':       ['Konjunktiv II','Participial phrases','Academic register'],
  'IELTS Reading':   ['Skimming','True/False/NG','Matching headings','Paraphrase recognition'],
  'IELTS Writing':   ['Task 1 overview','Trend vocab','Essay structure','Cohesive devices'],
  'IELTS Listening': ['Identifying numbers','Handling distractors','Form completion'],
  'IELTS Speaking':  ['Part 1 fluency','Cue card structure','Part 3 discussion'],
  'IELTS Mock':      ['Full mock test']
};

var timerInterval = null;
var timerSecs     = 0;
var selTopics     = [];
var selType       = 'Study';

document.querySelectorAll('.stype-btn').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('.stype-btn').forEach(function(x) { x.classList.remove('active'); });
    b.classList.add('active');
    selType = b.dataset.type;
  });
});

async function loadTopics() {
  var track = document.getElementById('track-sel').value;
  var c     = document.getElementById('topic-chips');
  selTopics = [];
  if (!track) {
    c.innerHTML = '<span style="font-size:12px;color:var(--ink3)">Select a track first</span>';
    return;
  }
  c.innerHTML = '<span style="font-size:12px;color:var(--ink3)">Loading\u2026</span>';
  try {
    var topics = await api.call('getTopicsForTrack', track);
    if (!topics || topics.length === 0) {
      c.innerHTML = '<span style="font-size:12px;color:var(--ink3)">No active topics for this track \u2014 add some in Syllabus</span>';
      return;
    }
    c.innerHTML = topics.map(function(t) {
      var label  = t.topic.length > 32 ? t.topic.slice(0, 30) + '\u2026' : t.topic;
      var safeId = t.id.replace(/'/g, "\\'");
      return '<button class="chip" onclick="toggleTopic(this,\'' + safeId + '\')" title="' + escHtml(t.topic) + '">' + escHtml(label) + '</button>';
    }).join('');
  } catch (e) {
    var fallback = TOPIC_CHIPS[track] || [];
    c.innerHTML = fallback.map(function(t) {
      return '<button class="chip" onclick="toggleTopic(this,\'' + t.replace(/'/g, "\\'") + '\')">' + escHtml(t) + '</button>';
    }).join('');
  }
}

function toggleTopic(btn, t) {
  var i = selTopics.indexOf(t);
  if (i >= 0) { selTopics.splice(i, 1); btn.classList.remove('active'); }
  else         { selTopics.push(t);      btn.classList.add('active'); }
}

async function startTimer() {
  var track = document.getElementById('track-sel').value;
  if (!track) { showToast('Please select a track first.'); return; }

  var btn = document.querySelector('#t-idle .btn--primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Starting\u2026'; }

  try {
    var res = await api.call('startSession', {
      track:       track,
      topicIds:    selTopics,
      sessionType: selType,
      notes:       document.getElementById('sess-notes').value
    });

    if (res && res.error) { showToast('Error: ' + res.error); return; }

    document.getElementById('t-idle').style.display   = 'none';
    document.getElementById('t-active').style.display = 'block';
    document.getElementById('timer-card').classList.add('running');
    document.getElementById('t-track-lbl').textContent = track;
    document.getElementById('t-type-lbl').textContent  = selType;

    var ac = document.getElementById('t-active-chips');
    ac.innerHTML = selTopics.map(function(t) { return '<span class="chip active">' + escHtml(t) + '</span>'; }).join('');

    timerSecs     = 0;
    timerInterval = setInterval(function() {
      timerSecs++;
      var m = String(Math.floor(timerSecs / 60)).padStart(2, '0');
      var s = String(timerSecs % 60).padStart(2, '0');
      document.getElementById('t-display').innerHTML = m + '<span class="sep">:</span>' + s;
    }, 1000);
  } catch (e) {
    showToast('Could not start session: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Start session'; }
  }
}

async function stopTimer() {
  clearInterval(timerInterval);
  var reported = timerSecs < 60 ? 1 : Math.round(timerSecs / 60);

  try {
    await api.call('stopSession', { minutesSelfReported: reported });
  } catch (e) {
    showToast('Warning: session may not have saved. ' + e.message);
  }

  resetTimerUI();
  showToast('Session saved \u2014 ' + reported + ' min logged');
  setTimeout(function() { openModal('modal-quality'); }, 400);
}

async function cancelTimer() {
  clearInterval(timerInterval);
  try { await api.call('cancelSession'); } catch (e) { /* silent */ }
  resetTimerUI();
}

function resetTimerUI() {
  timerSecs = 0;
  selTopics = [];
  document.getElementById('t-idle').style.display   = 'block';
  document.getElementById('t-active').style.display = 'none';
  document.getElementById('timer-card').classList.remove('running');
  document.getElementById('t-display').innerHTML    = '00<span class="sep">:</span>00';
  document.getElementById('track-sel').value        = '';
  document.getElementById('topic-chips').innerHTML  = '<span style="font-size:12px;color:var(--ink3)">Select a track first</span>';
  document.getElementById('sess-notes').value       = '';
}

// ── Quality stars ─────────────────────────────────────────────────────────────
document.querySelectorAll('.qstar').forEach(function(star) {
  star.addEventListener('click', function() {
    var val      = parseInt(star.dataset.q);
    var siblings = star.closest('.quality-row').querySelectorAll('.qstar');
    siblings.forEach(function(s, i) { s.classList.toggle('active', i < val); });
    var lbl    = star.closest('.modal') ? star.closest('.modal').querySelector('#quality-label') : null;
    var labels = ['','Poor focus','Okay','Good','Very good','Excellent'];
    if (lbl) lbl.textContent = labels[val] || '';
  });
});

// ── Phase options ─────────────────────────────────────────────────────────────
document.querySelectorAll('.phase-opt').forEach(function(o) {
  o.addEventListener('click', function() {
    document.querySelectorAll('.phase-opt').forEach(function(x) { x.classList.remove('active'); });
    o.classList.add('active');
  });
});

// ── Greeting ──────────────────────────────────────────────────────────────────
(function() {
  var hr  = new Date().getHours();
  var sub = document.getElementById('greet-sub');
  var dt  = document.getElementById('greet-date');
  if (sub) sub.textContent = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
  if (dt)  dt.textContent  = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
})();

// ── Online / offline ──────────────────────────────────────────────────────────
window.addEventListener('offline', function() { document.getElementById('offline-bar').style.display = 'block'; });
window.addEventListener('online',  function() { document.getElementById('offline-bar').style.display = 'none'; });

// ── Mood buttons ──────────────────────────────────────────────────────────────
document.querySelectorAll('.mood-btn').forEach(function(b) {
  b.addEventListener('click', function() {
    var row = b.closest('.mood-row');
    row.querySelectorAll('.mood-btn').forEach(function(x) { x.style.background = 'none'; });
    b.style.background = 'var(--gold-light)';
  });
});

// ── Page init: load real data ─────────────────────────────────────────────────
(async function() {
  // Streak badge
  try {
    var streak = await api.call('getStreak');
    var badge  = document.getElementById('streak-badge');
    if (badge) badge.textContent = '\uD83D\uDD25 ' + (streak || 0);
  } catch (e) { /* stays at - */ }

  // Timer recovery - if a session was left running
  try {
    var active = await api.call('getActiveSession');
    if (active && active.startTime) {
      var elapsed = Math.round((Date.now() - new Date(active.startTime).getTime()) / 1000);
      if (elapsed > 0) {
        document.getElementById('t-idle').style.display   = 'none';
        document.getElementById('t-active').style.display = 'block';
        document.getElementById('timer-card').classList.add('running');
        document.getElementById('t-track-lbl').textContent = active.track || '';
        document.getElementById('t-type-lbl').textContent  = active.sessionType || 'Study';
        timerSecs     = elapsed;
        timerInterval = setInterval(function() {
          timerSecs++;
          var m = String(Math.floor(timerSecs / 60)).padStart(2, '0');
          var s = String(timerSecs % 60).padStart(2, '0');
          document.getElementById('t-display').innerHTML = m + '<span class="sep">:</span>' + s;
        }, 1000);
      }
    }
  } catch (e) { /* no active session */ }
})();

// ── Initialise track dropdown to default workspace ────────────────────────────
_updateTrackDropdown('German');
</script>
