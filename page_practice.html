<!-- ═══════════════════════════════════════════════════════════════════════════
     page_practice.html — Practice Tracker (3-level: Book → Module → Section)
     ═══════════════════════════════════════════════════════════════════════════ -->

<style>
/* ── Practice page styles ── */
.prac-track-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px}
.prac-ttab{padding:5px 14px;border-radius:20px;font-size:12px;border:0.5px solid var(--border2);background:none;cursor:pointer;font-family:inherit;color:var(--ink2);transition:all .12s}
.prac-ttab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.prac-ttab:hover:not(.active){background:var(--surface2)}
.prac-ttab-count{font-size:10px;opacity:.7;margin-left:3px}

.prac-summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.prac-summary-card{text-align:center;padding:10px 8px}

/* ── Book level ── */
.prac-book{margin-bottom:14px}
.prac-book-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .1s;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.prac-book-hdr:hover{background:var(--surface2)}
.prac-book-expand{font-size:10px;color:var(--ink3);transition:transform .2s;flex-shrink:0}
.prac-book-expand.open{transform:rotate(90deg)}
.prac-book-icon{font-size:16px;flex-shrink:0}
.prac-book-name{flex:1;font-size:14px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prac-book-name.done{text-decoration:line-through;color:var(--ink3)}
.prac-book-progress{font-size:11px;color:var(--ink3);white-space:nowrap}
.prac-book-due{font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.prac-book-due.upcoming{background:var(--blue-bg);color:var(--blue);border:0.5px solid var(--blue-border)}
.prac-book-due.overdue{background:var(--red-bg);color:var(--red);border:0.5px solid var(--red-border)}
.prac-book-due.none{display:none}
.prac-book-actions{display:flex;gap:4px;opacity:0;transition:opacity .12s}
.prac-book-hdr:hover .prac-book-actions{opacity:1}
.prac-action-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;color:var(--ink3)}
.prac-action-btn:hover{background:var(--surface2);color:var(--ink)}

/* ── Module level ── */
.prac-modules{border-top:0.5px solid var(--border)}
.prac-module{border-top:0.5px solid var(--border)}
.prac-module:first-child{border-top:none}
.prac-mod-hdr{display:flex;align-items:center;gap:8px;padding:9px 16px 9px 28px;cursor:pointer;transition:background .1s}
.prac-mod-hdr:hover{background:var(--surface2)}
.prac-mod-expand{font-size:9px;color:var(--ink3);transition:transform .2s;flex-shrink:0}
.prac-mod-expand.open{transform:rotate(90deg)}
.prac-mod-icon{font-size:13px;flex-shrink:0}
.prac-mod-name{flex:1;font-size:13px;font-weight:500;min-width:0}
.prac-mod-name.done{text-decoration:line-through;color:var(--ink3)}
.prac-mod-progress{font-size:10px;color:var(--ink3);white-space:nowrap}
.prac-mod-actions{display:flex;gap:2px;opacity:0;transition:opacity .12s}
.prac-mod-hdr:hover .prac-mod-actions{opacity:1}

/* ── Section level (leaf checklist) ── */
.prac-sections{border-top:0.5px solid var(--border)}
.prac-sec{display:flex;align-items:center;gap:10px;padding:8px 16px 8px 50px;border-top:0.5px solid var(--border);transition:background .1s}
.prac-sec:first-child{border-top:none}
.prac-sec:hover{background:var(--surface2)}
.prac-sec-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.prac-sec-check:hover{border-color:var(--accent2)}
.prac-sec-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.prac-sec-check.done::after{content:'\2713';font-size:11px;font-weight:600}
.prac-sec-name{flex:1;font-size:13px;color:var(--ink);transition:color .12s}
.prac-sec-name.done{text-decoration:line-through;color:var(--ink3)}
.prac-sec-due{font-size:10px;color:var(--ink3)}
.prac-sec-due.overdue{color:var(--red)}
.prac-sec-actions{display:flex;gap:2px;opacity:0;transition:opacity .12s}
.prac-sec:hover .prac-sec-actions{opacity:1}

/* ── Inline rename ── */
.prac-rename-input{font-family:inherit;font-size:13px;border:1px solid var(--accent);border-radius:4px;padding:2px 6px;background:var(--surface);color:var(--ink);outline:none;width:100%;min-width:80px;box-sizing:border-box}
.prac-book-name,.prac-mod-name,.prac-sec-name{cursor:text}
.prac-book-name:not(.done):hover,.prac-mod-name:not(.done):hover,.prac-sec-name:not(.done):hover{text-decoration-style:dotted;text-decoration-line:underline;text-decoration-color:var(--ink3);text-underline-offset:3px}

/* ── Add row ── */
.prac-add-row{padding:6px 16px 6px 50px;border-top:0.5px solid var(--border)}
.prac-add-mod-row{padding:6px 16px 6px 28px;border-top:0.5px solid var(--border)}
.prac-add-btn{background:none;border:none;font-family:inherit;font-size:12px;color:var(--ink3);cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:5px}
.prac-add-btn:hover{color:var(--accent)}
.prac-inline-add{display:flex;gap:8px;align-items:center;width:100%}
.prac-inline-add input{flex:1;height:32px;font-size:12px}

/* ── Progress bar ── */
.prac-prog-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;flex:1;min-width:50px}
.prac-prog-fill{height:100%;border-radius:3px;background:var(--accent2);transition:width .3s ease}

/* ── Empty state ── */
.prac-empty{padding:40px 20px;text-align:center}
.prac-empty-icon{font-size:36px;margin-bottom:10px}
.prac-empty-text{font-size:14px;color:var(--ink2);margin-bottom:4px}
.prac-empty-sub{font-size:12px;color:var(--ink3)}

/* ── Template preview ── */
.prac-tpl-preview{background:var(--surface2);border-radius:var(--radius);padding:12px 14px;margin-top:10px;font-size:12px;color:var(--ink2);line-height:1.7;max-height:200px;overflow-y:auto}
.prac-tpl-mod{font-weight:500;margin-top:6px}
.prac-tpl-mod:first-child{margin-top:0}
.prac-tpl-sec{padding-left:16px;color:var(--ink3)}

/* ── Mobile: always show action buttons ── */
@media (max-width:768px) {
  .prac-book-actions{opacity:1}
  .prac-mod-actions{opacity:1}
  .prac-sec-actions{opacity:1}
  .prac-book-hdr{gap:6px;padding:10px 12px}
  .prac-mod-hdr{padding:9px 12px 9px 22px}
  .prac-sec{padding:8px 12px 8px 38px}
  .prac-add-row{padding:6px 12px 6px 38px}
  .prac-add-mod-row{padding:6px 12px 6px 22px}
  .prac-inline-add{flex-wrap:wrap}
}
</style>

<div class="page" id="page-practice">
  <div class="page-header">
    <div>
      <h1 class="page-title">Practice</h1>
      <div class="page-sub" id="prac-sub">Track your practice books &amp; tests</div>
    </div>
    <button class="btn btn--primary btn--sm" onclick="openModal('modal-prac-book')">+ Add book</button>
  </div>

  <!-- Track filter tabs -->
  <div class="prac-track-tabs" id="prac-tabs"></div>

  <!-- Summary cards -->
  <div class="prac-summary-row" id="prac-summary"></div>

  <!-- Book list -->
  <div id="prac-list">
    <div style="padding:20px;font-size:13px;color:var(--ink3)">Loading…</div>
  </div>
</div>

<!-- ═══ Modal: Add / Edit Book ═══ -->
<div class="modal-backdrop" id="modal-prac-book">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="prac-book-modal-title">Add practice book</div>
    <input type="hidden" id="prac-book-edit-id" value="">
    <div class="field">
      <label class="fl">Name</label>
      <input type="text" id="prac-book-name" placeholder="e.g. Cambridge IELTS Book 8">
    </div>
    <div class="field">
      <label class="fl">Track</label>
      <select id="prac-book-track">
        <option value="">- select -</option>
      </select>
    </div>
    <div class="field" id="prac-tpl-field">
      <label class="fl">Structure template</label>
      <select id="prac-book-template" onchange="pracPreviewTemplate()">
        <option value="">- none (add manually) -</option>
      </select>
      <div id="prac-tpl-preview"></div>
    </div>
    <div class="field">
      <label class="fl">Due date (optional)</label>
      <input type="date" id="prac-book-due">
    </div>
    <div class="field">
      <label class="fl">Notes (optional)</label>
      <textarea id="prac-book-notes" placeholder="e.g. Focus on academic passages"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn--primary" style="flex:1" id="prac-book-save-btn" onclick="pracSaveBook()">Add book</button>
    </div>
  </div>
</div>

<!-- ═══ Modal: Add Module ═══ -->
<div class="modal-backdrop" id="modal-prac-module">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add module</div>
    <div style="font-size:12px;color:var(--ink3);margin-bottom:14px" id="prac-mod-parent-lbl">to: —</div>
    <input type="hidden" id="prac-mod-parent-id" value="">
    <div class="field">
      <label class="fl">Module name</label>
      <input type="text" id="prac-mod-name" placeholder="e.g. Listening, Reading, Writing">
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn--primary" style="flex:1" onclick="pracSaveModule()">Add module</button>
    </div>
  </div>
</div>

<!-- ═══ Modal: Add Sections (batch) ═══ -->
<div class="modal-backdrop" id="modal-prac-sections">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add sections</div>
    <div style="font-size:12px;color:var(--ink3);margin-bottom:14px" id="prac-sec-parent-lbl">to: —</div>
    <input type="hidden" id="prac-sec-parent-id" value="">
    <div class="field">
      <label class="fl">Sections (one per line)</label>
      <textarea id="prac-sec-names" style="height:140px" placeholder="Section 1&#10;Section 2&#10;Section 3"></textarea>
    </div>
    <div class="field">
      <label class="fl">Due date (optional, applies to all)</label>
      <input type="date" id="prac-sec-due">
    </div>
    <div class="modal-footer">
      <button class="btn btn--ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn--primary" style="flex:1" onclick="pracSaveSectionsBatch()">Add sections</button>
    </div>
  </div>
</div>

<!-- ═══ Modal: Edit Entry (book / module / section) ═══ -->
<div class="modal-backdrop" id="modal-prac-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="prac-edit-title">Edit</div>
    <input type="hidden" id="prac-edit-id" value="">
    <input type="hidden" id="prac-edit-type" value="">
    <div class="field">
      <label class="fl">Name</label>
      <input type="text" id="prac-edit-name">
    </div>
    <div class="field">
      <label class="fl">Due date</label>
      <input type="date" id="prac-edit-due">
    </div>
    <div class="field">
      <label class="fl">Notes</label>
      <textarea id="prac-edit-notes"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn--danger btn--sm" onclick="pracDeleteEntry()" style="margin-right:auto">Delete</button>
      <button class="btn btn--ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn--primary" style="flex:1" onclick="pracSaveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
var _pracData      = [];
var _pracTrack     = 'All';
var _pracSummary   = {};
var _pracLoaded    = false;
var _pracExpBook   = {};    // bookId → bool
var _pracExpMod    = {};    // moduleId → bool
var _pracTemplates = [];    // template names from server
var _pracTplCache  = {};    // templateName → structure

var PRAC_TRACKS = ['All'].concat(window.APP_TRACKS || []);

// ── Load ──────────────────────────────────────────────────────────────────────
async function pracLoad() {
  if (_pracLoaded) { pracRender(); return; }

  // Populate track selector
  var sel = document.getElementById('prac-book-track');
  if (sel && sel.options.length <= 1) {
    (window.APP_TRACKS || []).forEach(function(t) {
      var o = document.createElement('option');
      o.value = t; o.textContent = t;
      sel.appendChild(o);
    });
  }

  document.getElementById('prac-list').innerHTML =
    '<div style="padding:20px;font-size:13px;color:var(--ink3)">Loading practice data…</div>';

  try {
    var results = await Promise.all([
      api.call('getAllPracticeData'),
      api.call('getPracticeSummary'),
      api.call('getPracticeTemplates'),
    ]);
    _pracData      = Array.isArray(results[0]) ? results[0] : [];
    _pracSummary   = results[1] || { tracks: {}, total: { entered: 0, completed: 0 } };
    _pracTemplates = Array.isArray(results[2]) ? results[2] : [];
    _pracLoaded    = true;

    // Populate template selector
    var tplSel = document.getElementById('prac-book-template');
    if (tplSel && tplSel.options.length <= 1) {
      _pracTemplates.forEach(function(t) {
        var o = document.createElement('option');
        o.value = t; o.textContent = t;
        tplSel.appendChild(o);
      });
    }

    _pracRenderTabs();
    pracRender();
  } catch (e) {
    document.getElementById('prac-list').innerHTML =
      '<div style="padding:20px;font-size:13px;color:var(--red2)">Error: ' + escHtml(e.message) + '</div>';
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function _pracRenderTabs() {
  var el = document.getElementById('prac-tabs');
  el.innerHTML = PRAC_TRACKS.map(function(t) {
    var count = '';
    if (t === 'All') {
      count = _pracData.length;
    } else {
      count = _pracData.filter(function(b) { return b.track === t; }).length;
    }
    var countHtml = count > 0 ? '<span class="prac-ttab-count">(' + count + ')</span>' : '';
    return '<button class="prac-ttab' + (t === _pracTrack ? ' active' : '') +
           '" onclick="pracSwitchTrack(\'' + escHtml(t) + '\')">' + escHtml(t) + countHtml + '</button>';
  }).join('');
}

function pracSwitchTrack(track) {
  _pracTrack = track;
  _pracRenderTabs();
  pracRender();
}

// ── Main render ───────────────────────────────────────────────────────────────
function pracRender() {
  _pracRenderSummary();
  _pracRenderList();
}

function _pracRenderSummary() {
  var el     = document.getElementById('prac-summary');
  var tracks = _pracSummary.tracks || {};
  var total  = _pracSummary.total || { entered: 0, completed: 0 };

  if (_pracTrack === 'All') {
    var trackKeys = Object.keys(tracks);
    if (trackKeys.length === 0) { el.innerHTML = ''; return; }
    el.innerHTML = trackKeys.map(function(t) {
      var d   = tracks[t];
      var pct = d.entered > 0 ? Math.round(d.completed / d.entered * 100) : 0;
      return '<div class="sb prac-summary-card">' +
        '<div class="sb-lbl">' + escHtml(t) + '</div>' +
        '<div style="font-size:18px;font-weight:500;margin-top:4px">' + d.completed + '/' + d.entered + '</div>' +
        '<div class="prac-prog-bar" style="margin-top:6px"><div class="prac-prog-fill" style="width:' + pct + '%"></div></div>' +
        '</div>';
    }).join('');
  } else {
    var d   = tracks[_pracTrack] || { entered: 0, completed: 0 };
    var pct = d.entered > 0 ? Math.round(d.completed / d.entered * 100) : 0;
    el.innerHTML =
      '<div class="sb prac-summary-card" style="max-width:200px">' +
      '<div class="sb-lbl">' + escHtml(_pracTrack) + '</div>' +
      '<div style="font-size:22px;font-weight:500;margin-top:4px">' + d.completed + ' / ' + d.entered + '</div>' +
      '<div class="prac-prog-bar" style="margin-top:6px"><div class="prac-prog-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="sb-unit">' + pct + '% complete</div>' +
      '</div>';
  }
}

function _pracRenderList() {
  var el   = document.getElementById('prac-list');
  var data = _pracTrack === 'All'
    ? _pracData
    : _pracData.filter(function(b) { return b.track === _pracTrack; });

  if (data.length === 0) {
    el.innerHTML =
      '<div class="prac-empty">' +
      '<div class="prac-empty-icon">\uD83D\uDCDA</div>' +
      '<div class="prac-empty-text">No practice books yet</div>' +
      '<div class="prac-empty-sub">Add a book to start tracking your practice</div>' +
      '</div>';
    return;
  }

  el.innerHTML = data.map(function(book) { return _renderBook_(book); }).join('');
}

// ── Render: Book ──────────────────────────────────────────────────────────────
function _renderBook_(book) {
  var isExp    = _pracExpBook[book.id] !== false; // default open
  var total    = book.totalSections || 0;
  var done     = book.doneSections  || 0;
  var pct      = total > 0 ? Math.round(done / total * 100) : 0;
  var isDone   = book.status === 'done';
  var dueClass = _pracDueClass(book.dueDate);
  var modules  = book.modules || [];

  var html = '<div class="card prac-book" style="padding:0;overflow:hidden">';

  // Book header
  html += '<div class="prac-book-hdr" onclick="pracToggleBook(\'' + book.id + '\')">';
  html += '<span class="prac-book-expand' + (isExp ? ' open' : '') + '">\u25B6</span>';
  html += '<span class="prac-book-icon">' + (isDone ? '\u2705' : '\uD83D\uDCD6') + '</span>';
  html += '<span class="prac-book-name' + (isDone ? ' done' : '') + '" onclick="pracStartRename(\'' + book.id + '\',this,event)" data-id="' + book.id + '">' + escHtml(book.name) + '</span>';
  html += '<span class="prac-book-progress">' + done + '/' + total + '</span>';
  html += '<div class="prac-prog-bar" style="max-width:60px"><div class="prac-prog-fill" style="width:' + pct + '%"></div></div>';
  if (book.dueDate) {
    html += '<span class="prac-book-due ' + dueClass + '">' + _pracDueLabel(book.dueDate) + '</span>';
  }
  html += '<span class="prac-book-actions">';
  html += '<button class="prac-action-btn" onclick="event.stopPropagation();pracOpenAddModule(\'' + book.id + '\',\'' + escAttr(book.name) + '\')" title="Add module">+\uD83D\uDCC2</button>';
  html += '<button class="prac-action-btn" onclick="event.stopPropagation();pracOpenEdit(\'' + book.id + '\',\'book\')" title="Edit">\u270E</button>';
  html += '</span>';
  html += '</div>';

  // Modules
  if (isExp && modules.length > 0) {
    html += '<div class="prac-modules">';
    modules.forEach(function(mod) {
      html += _renderModule_(mod, book.id);
    });
    // Add module row
    html += '<div class="prac-add-mod-row">';
    html += '<button class="prac-add-btn" onclick="pracOpenAddModule(\'' + book.id + '\',\'' + escAttr(book.name) + '\')">+ Add module</button>';
    html += '</div>';
    html += '</div>';
  } else if (isExp && modules.length === 0) {
    html += '<div class="prac-modules">';
    html += '<div style="padding:14px 28px;font-size:12px;color:var(--ink3)">No modules yet</div>';
    html += '<div class="prac-add-mod-row">';
    html += '<button class="prac-add-btn" onclick="pracOpenAddModule(\'' + book.id + '\',\'' + escAttr(book.name) + '\')">+ Add module</button>';
    html += '</div>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ── Render: Module ────────────────────────────────────────────────────────────
function _renderModule_(mod, bookId) {
  var isExp    = _pracExpMod[mod.id] !== false; // default open
  var total    = mod.totalSections || 0;
  var done     = mod.doneSections  || 0;
  var pct      = total > 0 ? Math.round(done / total * 100) : 0;
  var isDone   = mod.status === 'done';
  var sections = mod.sections || [];

  var html = '<div class="prac-module">';

  // Module header
  html += '<div class="prac-mod-hdr" onclick="pracToggleMod(\'' + mod.id + '\')">';
  html += '<span class="prac-mod-expand' + (isExp ? ' open' : '') + '">\u25B6</span>';
  html += '<span class="prac-mod-icon">' + _pracModIcon(mod.name, isDone) + '</span>';
  html += '<span class="prac-mod-name' + (isDone ? ' done' : '') + '" onclick="pracStartRename(\'' + mod.id + '\',this,event)" data-id="' + mod.id + '">' + escHtml(mod.name) + '</span>';
  html += '<span class="prac-mod-progress">' + done + '/' + total + '</span>';
  html += '<div class="prac-prog-bar" style="max-width:50px"><div class="prac-prog-fill" style="width:' + pct + '%"></div></div>';
  html += '<span class="prac-mod-actions">';
  html += '<button class="prac-action-btn" onclick="event.stopPropagation();pracOpenAddSections(\'' + mod.id + '\',\'' + escAttr(mod.name) + '\')" title="Add sections">+</button>';
  html += '<button class="prac-action-btn" onclick="event.stopPropagation();pracOpenEdit(\'' + mod.id + '\',\'module\')" title="Edit">\u270E</button>';
  html += '</span>';
  html += '</div>';

  // Sections
  if (isExp && sections.length > 0) {
    html += '<div class="prac-sections">';
    sections.forEach(function(sec) {
      html += _renderSection_(sec);
    });
    // Inline add section
    html += '<div class="prac-add-row">';
    html += '<button class="prac-add-btn" onclick="pracOpenAddSections(\'' + mod.id + '\',\'' + escAttr(mod.name) + '\')">+ Add section</button>';
    html += '</div>';
    html += '</div>';
  } else if (isExp && sections.length === 0) {
    html += '<div class="prac-sections">';
    html += '<div style="padding:8px 50px;font-size:12px;color:var(--ink3)">No sections yet</div>';
    html += '<div class="prac-add-row">';
    html += '<button class="prac-add-btn" onclick="pracOpenAddSections(\'' + mod.id + '\',\'' + escAttr(mod.name) + '\')">+ Add section</button>';
    html += '</div>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ── Render: Section ───────────────────────────────────────────────────────────
function _renderSection_(sec) {
  var isDone   = sec.status === 'done';
  var dueClass = _pracDueClass(sec.dueDate);
  var dueLabel = sec.dueDate ? _pracDueLabel(sec.dueDate) : '';

  var html = '<div class="prac-sec">';
  html += '<div class="prac-sec-check' + (isDone ? ' done' : '') + '" onclick="pracToggleSection(\'' + sec.id + '\')"></div>';
  html += '<span class="prac-sec-name' + (isDone ? ' done' : '') + '" onclick="pracStartRename(\'' + sec.id + '\',this,event)" data-id="' + sec.id + '">' + escHtml(sec.name) + '</span>';
  if (dueLabel) {
    html += '<span class="prac-sec-due ' + dueClass + '">' + dueLabel + '</span>';
  }
  html += '<span class="prac-sec-actions">';
  html += '<button class="prac-action-btn" onclick="pracOpenEdit(\'' + sec.id + '\',\'section\')" title="Edit">\u270E</button>';
  html += '</span>';
  html += '</div>';
  return html;
}

// ── Expand / collapse ─────────────────────────────────────────────────────────
function pracToggleBook(id) {

function pracToggleMod(id) {

// ── Toggle section done/pending ───────────────────────────────────────────────
async function pracToggleSection(id) {

    _pracLoaded = false;

// ── Inline rename ─────────────────────────────────────────────────────────────
function pracStartRename(id, el, e) {
  e.stopPropagation();
  // Don't rename if already in rename mode
  if (el.querySelector('input')) return;

  var originalName = el.textContent;
  var input = document.createElement('input');
  input.type = 'text';
  input.className = 'prac-rename-input';
  input.value = originalName;

  el.textContent = '';
  el.appendChild(input);
  input.focus();
  input.select();

  input.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') {
      ev.preventDefault();
      pracFinishRename(id, input, originalName);
    } else if (ev.key === 'Escape') {
      ev.preventDefault();
      pracCancelRename(el, originalName);
    }
  });

  input.addEventListener('blur', function() {
    // Small delay so click events on other elements fire first
    setTimeout(function() {
      if (document.body.contains(input)) {
        pracFinishRename(id, input, originalName);
      }
    }, 100);
  });
}

async function pracFinishRename(id, input, originalName) {
  var newName = (input.value || '').trim();
  var parentSpan = input.parentElement;

  // If empty or unchanged, cancel
  if (!newName || newName === originalName) {
    pracCancelRename(parentSpan, originalName);
    return;
  }

  // Replace input with new name immediately (optimistic)
  parentSpan.textContent = newName;

  try {
    var res = await api.call('updatePracticeEntry', id, { name: newName });
    if (res.error) {
      showToast(res.error);
      parentSpan.textContent = originalName;
      return;
    }
    // Update local data so re-renders keep the new name
    var entry = _pracFindEntry(id);
    if (entry) entry.name = newName;
    showToast('Renamed');
  } catch (e) {
    showToast('Error: ' + e.message);
    parentSpan.textContent = originalName;
  }
}

function pracCancelRename(el, originalName) {
  el.textContent = originalName;
}

// ── Add Book ──────────────────────────────────────────────────────────────────
function pracOpenAddBook() {
  document.getElementById('prac-book-edit-id').value = '';
  document.getElementById('prac-book-name').value    = '';
  document.getElementById('prac-book-track').value   = '';
  document.getElementById('prac-book-template').value = '';
  document.getElementById('prac-book-due').value     = '';
  document.getElementById('prac-book-notes').value   = '';
  document.getElementById('prac-tpl-preview').innerHTML = '';
  document.getElementById('prac-book-modal-title').textContent = 'Add practice book';
  document.getElementById('prac-book-save-btn').textContent = 'Add book';
  document.getElementById('prac-tpl-field').style.display = '';
  openModal('modal-prac-book');
}

async function pracSaveBook() {
  var editId = document.getElementById('prac-book-edit-id').value;
  var name   = document.getElementById('prac-book-name').value.trim();
  var track  = document.getElementById('prac-book-track').value;
  var tpl    = document.getElementById('prac-book-template').value;
  var due    = document.getElementById('prac-book-due').value;
  var notes  = document.getElementById('prac-book-notes').value;

  if (!name) { showToast('Name is required'); return; }
  if (!editId && !track) { showToast('Track is required'); return; }

  try {
    var res;
    if (editId) {
      res = await api.call('updatePracticeEntry', editId, { name: name, dueDate: due, notes: notes });
    } else {
      res = await api.call('addPracticeBook', { name: name, track: track, templateName: tpl, dueDate: due, notes: notes });
    }
    if (res.error) { showToast(res.error); return; }
    closeModals();
    _pracLoaded = false;
    await pracLoad();
    showToast(editId ? 'Book updated' : 'Book added');
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

// ── Template preview ──────────────────────────────────────────────────────────
async function pracPreviewTemplate() {
  var tplName = document.getElementById('prac-book-template').value;
  var el      = document.getElementById('prac-tpl-preview');
  if (!tplName) { el.innerHTML = ''; return; }

  if (_pracTplCache[tplName]) {
    _renderTplPreview(el, _pracTplCache[tplName]);
    return;
  }

  try {
    var structure = await api.call('getPracticeTemplateStructure', tplName);
    if (structure) {
      _pracTplCache[tplName] = structure;
      _renderTplPreview(el, structure);
    } else {
      el.innerHTML = '<div class="prac-tpl-preview">No preview available</div>';
    }
  } catch (e) {
    el.innerHTML = '';
  }
}

function _renderTplPreview(el, structure) {
  var html = '<div class="prac-tpl-preview">';
  html += '<div style="font-size:11px;color:var(--ink3);margin-bottom:6px">This will create:</div>';
  Object.keys(structure).forEach(function(modName) {
    html += '<div class="prac-tpl-mod">\uD83D\uDCC2 ' + escHtml(modName) + '</div>';
    var secs = structure[modName] || [];
    secs.forEach(function(s) {
      html += '<div class="prac-tpl-sec">\u2022 ' + escHtml(s) + '</div>';
    });
  });
  html += '</div>';
  el.innerHTML = html;
}

// ── Helpers ───────────────────────────────────────────────────────────────────

/** Deep-find an entry in the 3-level tree by ID. */
function _pracFindEntry(id) {
  for (var i = 0; i < _pracData.length; i++) {
    var book = _pracData[i];
    if (book.id === id) return book;
    var mods = book.modules || [];
    for (var j = 0; j < mods.length; j++) {
      if (mods[j].id === id) return mods[j];
      var secs = mods[j].sections || [];
      for (var k = 0; k < secs.length; k++) {
        if (secs[k].id === id) return secs[k];
      }
    }
  }
  return null;
}

/** Module icon based on name keyword. */
function _pracModIcon(name, isDone) {
  if (isDone) return '\u2705';
  var n = (name || '').toLowerCase();
  if (n.indexOf('listen') !== -1) return '\uD83C\uDFA7';
  if (n.indexOf('read')   !== -1) return '\uD83D\uDCD6';
  if (n.indexOf('writ')   !== -1) return '\u270D\uFE0F';
  if (n.indexOf('speak')  !== -1) return '\uD83D\uDDE3\uFE0F';
  return '\uD83D\uDCC2';
}

/** Due date → CSS class. */
function _pracDueClass(dateStr) {
  if (!dateStr) return 'none';
  var d = new Date(dateStr); d.setHours(0,0,0,0);
  var today = new Date(); today.setHours(0,0,0,0);
  return d < today ? 'overdue' : 'upcoming';
}

/** Due date → label. */
function _pracDueLabel(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr); d.setHours(0,0,0,0);
  var today = new Date(); today.setHours(0,0,0,0);
  var diff = Math.round((d - today) / 86400000);
  if (diff < 0) return Math.abs(diff) + 'd overdue';
  if (diff === 0) return 'Due today';
  if (diff === 1) return 'Due tomorrow';
  return 'Due ' + dateStr;
}

function escAttr(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
