<!-- ═══════════════════════════════════════════════════════════════════════════
     page_practice.html — Practice Tracker page
     Track books/tests → passages/tasks with check-off, due dates, progress
     ═══════════════════════════════════════════════════════════════════════════ -->

<style>
/* ── Practice page styles ── */
.prac-track-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px}
.prac-ttab{padding:5px 14px;border-radius:20px;font-size:12px;border:0.5px solid var(--border2);background:none;cursor:pointer;font-family:inherit;color:var(--ink2);transition:all .12s}
.prac-ttab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.prac-ttab:hover:not(.active){background:var(--surface2)}
.prac-ttab .prac-ttab-count{font-size:10px;opacity:.7;margin-left:3px}

.prac-summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.prac-summary-card{text-align:center;padding:10px 8px}

.prac-resource{margin-bottom:14px}
.prac-res-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .1s;border-radius:var(--radius) var(--radius) 0 0}
.prac-res-header:hover{background:var(--surface2)}
.prac-res-expand{font-size:10px;color:var(--ink3);transition:transform .2s;flex-shrink:0}
.prac-res-expand.open{transform:rotate(90deg)}
.prac-res-name{flex:1;font-size:14px;font-weight:500}
.prac-res-progress{font-size:11px;color:var(--ink3);white-space:nowrap}
.prac-res-due{font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.prac-res-due.upcoming{background:var(--blue-bg);color:var(--blue);border:0.5px solid var(--blue-border)}
.prac-res-due.overdue{background:var(--red-bg);color:var(--red);border:0.5px solid var(--red-border)}
.prac-res-due.none{display:none}
.prac-res-actions{display:flex;gap:4px;opacity:0;transition:opacity .12s}
.prac-res-header:hover .prac-res-actions{opacity:1}
.prac-res-action-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;color:var(--ink3)}
.prac-res-action-btn:hover{background:var(--surface2);color:var(--ink)}

.prac-items{border-top:0.5px solid var(--border)}
.prac-item{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 38px;border-top:0.5px solid var(--border);transition:background .1s}
.prac-item:first-child{border-top:none}
.prac-item:hover{background:var(--surface2)}
.prac-item-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.prac-item-check:hover{border-color:var(--accent2)}
.prac-item-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.prac-item-check.done::after{content:'✓';font-size:11px;font-weight:600}
.prac-item-name{flex:1;font-size:13px;color:var(--ink);transition:color .12s}
.prac-item-name.done{text-decoration:line-through;color:var(--ink3)}
.prac-item-due{font-size:10px;color:var(--ink3)}
.prac-item-due.overdue{color:var(--red)}
.prac-item-actions{display:flex;gap:2px;opacity:0;transition:opacity .12s}
.prac-item:hover .prac-item-actions{opacity:1}

.prac-add-item-row{padding:6px 16px 6px 38px;border-top:0.5px solid var(--border)}
.prac-add-item-btn{background:none;border:none;font-family:inherit;font-size:12px;color:var(--ink3);cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:5px}
.prac-add-item-btn:hover{color:var(--accent)}
.prac-inline-add{display:flex;gap:8px;align-items:center;width:100%}
.prac-inline-add input{flex:1;height:32px;font-size:12px}
.prac-inline-add input[type=date]{width:130px;flex:none}

.prac-empty{padding:40px 20px;text-align:center}
.prac-empty-icon{font-size:36px;margin-bottom:10px}
.prac-empty-text{font-size:14px;color:var(--ink2);margin-bottom:4px}
.prac-empty-sub{font-size:12px;color:var(--ink3)}

.prac-prog-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;flex:1;min-width:50px}
.prac-prog-fill{height:100%;border-radius:3px;background:var(--accent2);transition:width .3s ease}

/* Mobile: always show action buttons since no hover */
@media (max-width:768px) {
  .prac-res-actions{opacity:1}
  .prac-item-actions{opacity:1}
  .prac-res-header{gap:6px;padding:10px 12px}
  .prac-item{padding:9px 12px 9px 28px}
  .prac-add-item-row{padding:6px 12px 6px 28px}
  .prac-inline-add{flex-wrap:wrap}
  .prac-inline-add input[type=date]{width:100%;flex:1}
}
</style>

<div class="page" id="page-practice">

      <h1 class="page-title">Practice</h1>
      <div class="page-sub" id="prac-sub">Track your practice materials</div>

  <!-- Track filter tabs -->

  <!-- Summary cards -->

  <!-- Resource list -->

    <div style="padding:20px;font-size:13px;color:var(--ink3)">Loading…</div>

    <div class="modal-title">Add practice items</div>

<script>
// ── Practice page state ───────────────────────────────────────────────────────
var _pracData     = [];
var _pracTrack    = 'All';
var _pracSummary  = {};
var _pracLoaded   = false;
var _pracExpanded = {};     // { resourceId: true/false }
var _pracBatchParent = '';  // for batch add modal

// ── Track list from constants ─────────────────────────────────────────────────
var PRAC_TRACKS = ['All'].concat(window.APP_TRACKS || []);

// ── Load ──────────────────────────────────────────────────────────────────────
async function pracLoad() {
  if (_pracLoaded) { pracRender(); return; }

  // Populate track selector in modal
  var sel = document.getElementById('prac-res-track');
  if (sel && sel.options.length <= 1) {
    (window.APP_TRACKS || []).forEach(function(t) {
      var o = document.createElement('option');
      o.value = t; o.textContent = t;
      sel.appendChild(o);
    });
  }

  document.getElementById('prac-list').innerHTML =
    '<div style="padding:20px;font-size:13px;color:var(--ink3)">Loading practice data…</div>';

  try {
    var results = await Promise.all([
      api.call('getAllPracticeData'),
      api.call('getPracticeSummary')
    ]);
    _pracData    = Array.isArray(results[0]) ? results[0] : [];
    _pracSummary = results[1] || { tracks: {}, total: { entered: 0, completed: 0 } };
    _pracLoaded  = true;
    _pracRenderTabs();
    pracRender();
  } catch (e) {
    document.getElementById('prac-list').innerHTML =
      '<div style="padding:20px;font-size:13px;color:var(--red2)">Error: ' + escHtml(e.message) + '</div>';
  }
}

// ── Tab rendering ─────────────────────────────────────────────────────────────
function _pracRenderTabs() {
  var el = document.getElementById('prac-tabs');
  el.innerHTML = PRAC_TRACKS.map(function(t) {
    var count = '';
    if (t === 'All') {
      count = _pracData.length;
    } else {
      count = _pracData.filter(function(r) { return r.track === t; }).length;
    }
    var countHtml = count > 0 ? '<span class="prac-ttab-count">(' + count + ')</span>' : '';
    return '<button class="prac-ttab' + (t === _pracTrack ? ' active' : '') +
           '" onclick="pracSwitchTrack(\'' + escHtml(t) + '\')">' + escHtml(t) + countHtml + '</button>';
  }).join('');
}

function pracSwitchTrack(track) {
  _pracTrack = track;
  _pracRenderTabs();
  pracRender();
}

// ── Main render ───────────────────────────────────────────────────────────────
function pracRender() {
  _pracRenderSummary();
  _pracRenderList();
}

function _pracRenderSummary() {
  var el = document.getElementById('prac-summary');
  var tracks = _pracSummary.tracks || {};
  var total  = _pracSummary.total || { entered: 0, completed: 0 };

  if (_pracTrack === 'All') {
    // Show per-track breakdown
    var trackKeys = Object.keys(tracks);
    if (trackKeys.length === 0) {
      el.innerHTML = '';
      return;
    }
    el.innerHTML = trackKeys.map(function(t) {
      var d = tracks[t];
      var pct = d.entered > 0 ? Math.round(d.completed / d.entered * 100) : 0;
      return '<div class="sb prac-summary-card">' +
        '<div class="sb-lbl">' + escHtml(t) + '</div>' +
        '<div style="font-size:18px;font-weight:500;margin-top:4px">' + d.completed + '/' + d.entered + '</div>' +
        '<div class="prac-prog-bar" style="margin-top:6px"><div class="prac-prog-fill" style="width:' + pct + '%"></div></div>' +
        '</div>';
    }).join('');
  } else {
    var d = tracks[_pracTrack] || { entered: 0, completed: 0 };
    var pct = d.entered > 0 ? Math.round(d.completed / d.entered * 100) : 0;
    el.innerHTML =
      '<div class="sb prac-summary-card" style="max-width:200px">' +
      '<div class="sb-lbl">' + escHtml(_pracTrack) + '</div>' +
      '<div style="font-size:22px;font-weight:500;margin-top:4px">' + d.completed + ' / ' + d.entered + '</div>' +
      '<div class="prac-prog-bar" style="margin-top:6px"><div class="prac-prog-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="sb-unit">' + pct + '% complete</div>' +
      '</div>';
  }
}

function _pracRenderList() {
  var el   = document.getElementById('prac-list');
  var data = _pracTrack === 'All'
    ? _pracData
    : _pracData.filter(function(r) { return r.track === _pracTrack; });

  if (data.length === 0) {
    el.innerHTML =
      '<div class="prac-empty">' +
      '<div class="prac-empty-icon">📋</div>' +
      '<div class="prac-empty-text">No practice resources yet</div>' +
      '<div class="prac-empty-sub">Add a book, test, or worksheet to start tracking</div>' +
      '</div>';
    return;
  }

  el.innerHTML = data.map(function(res) {
    var items      = res.items || [];
    var doneCount  = items.filter(function(it) { return it.status === 'done'; }).length;
    var totalCount = items.length;
    var isExpanded = _pracExpanded[res.id] !== false; // default open
    var pct        = totalCount > 0 ? Math.round(doneCount / totalCount * 100) : 0;
    var dueClass   = _pracDueClass(res.dueDate);

    var html = '<div class="card prac-resource" style="padding:0;overflow:hidden">';

    // Resource header
    html += '<div class="prac-res-header" onclick="pracToggleExpand(\'' + res.id + '\')">';
    html += '<span class="prac-res-expand' + (isExpanded ? ' open' : '') + '">▶</span>';
    html += '<span class="prac-res-name">' + escHtml(res.name) + '</span>';
    if (res.dueDate) {
      html += '<span class="prac-res-due ' + dueClass + '">' + _pracFmtDue(res.dueDate) + '</span>';
    }
    if (totalCount > 0) {
      html += '<span class="prac-res-progress">' + doneCount + '/' + totalCount + '</span>';
      html += '<div class="prac-prog-bar" style="width:60px"><div class="prac-prog-fill" style="width:' + pct + '%"></div></div>';
    }
    html += '<div class="prac-res-actions" onclick="event.stopPropagation()">';
    html += '<button class="prac-res-action-btn" title="Add items" onclick="pracOpenBatchAdd(\'' + res.id + '\',\'' + escHtml(res.name).replace(/'/g, "\\'") + '\')">＋</button>';
    html += '<button class="prac-res-action-btn" title="Edit" onclick="pracEditResource(\'' + res.id + '\')">✎</button>';
    html += '<button class="prac-res-action-btn" title="Delete" onclick="pracDeleteResource(\'' + res.id + '\',\'' + escHtml(res.name).replace(/'/g, "\\'") + '\')">🗑</button>';
    html += '</div>';
    html += '</div>';

    // Items (collapsible)
    if (isExpanded) {
      html += '<div class="prac-items">';
      items.forEach(function(it) {
        var isDone = it.status === 'done';
        var itemDueClass = _pracDueClass(it.dueDate);
        html += '<div class="prac-item">';
        html += '<div class="prac-item-check' + (isDone ? ' done' : '') + '" onclick="pracToggleItem(\'' + it.id + '\')"></div>';
        html += '<span class="prac-item-name' + (isDone ? ' done' : '') + '">' + escHtml(it.name) + '</span>';
        if (it.dueDate && !isDone) {
          html += '<span class="prac-item-due ' + itemDueClass + '">' + _pracFmtDue(it.dueDate) + '</span>';
        }
        if (isDone && it.completedDate) {
          html += '<span class="prac-item-due">done ' + _pracFmtDue(it.completedDate) + '</span>';
        }
        html += '<div class="prac-item-actions">';
        html += '<button class="prac-res-action-btn" title="Edit" onclick="pracOpenEditItem(\'' + it.id + '\')">✎</button>';
        html += '</div>';
        html += '</div>';
      });
      // Inline add row
      html += '<div class="prac-add-item-row">';
      html += '<button class="prac-add-item-btn" onclick="pracStartInlineAdd(this,\'' + res.id + '\')">';
      html += '<span>+</span> Add item</button>';
      html += '</div>';
      html += '</div>';
    }

    html += '</div>';
    return html;
  }).join('');
}

// ── Expand/collapse ───────────────────────────────────────────────────────────
function pracToggleExpand(resId) {
  _pracExpanded[resId] = _pracExpanded[resId] === false ? true : false;
  _pracRenderList();
}

// ── Toggle item done/pending ──────────────────────────────────────────────────
async function pracToggleItem(itemId) {
  // Optimistic UI update
  _pracData.forEach(function(res) {
    (res.items || []).forEach(function(it) {
      if (it.id === itemId) {
        it.status = it.status === 'done' ? 'pending' : 'done';
        it.completedDate = it.status === 'done' ? new Date().toISOString().split('T')[0] : '';
      }
    });
    // Recompute resource status
    var items = res.items || [];
    var allDone = items.length > 0 && items.every(function(it) { return it.status === 'done'; });
    res.status = allDone ? 'done' : 'pending';
  });
  // Update summary optimistically
  _pracRecomputeSummary();
  pracRender();

  try {
    await api.call('togglePracticeItemStatus', itemId);
  } catch (e) {
    showToast('Error: ' + e.message);
    _pracLoaded = false;
    pracLoad(); // reload from server
  }
}

function _pracRecomputeSummary() {
  var tracks = {};
  var totalE = 0, totalC = 0;
  _pracData.forEach(function(res) {
    (res.items || []).forEach(function(it) {
      if (!tracks[it.track]) tracks[it.track] = { entered: 0, completed: 0 };
      tracks[it.track].entered++;
      totalE++;
      if (it.status === 'done') { tracks[it.track].completed++; totalC++; }
    });
  });
  _pracSummary = { tracks: tracks, total: { entered: totalE, completed: totalC } };
}

// ── Save resource ─────────────────────────────────────────────────────────────
async function pracSaveResource() {
  var editId = document.getElementById('prac-res-edit-id').value;
  var name   = document.getElementById('prac-res-name').value.trim();
  var track  = document.getElementById('prac-res-track').value;
  var due    = document.getElementById('prac-res-due').value;
  var notes  = document.getElementById('prac-res-notes').value;

  if (!name)  { showToast('Name is required'); return; }
  if (!track) { showToast('Track is required'); return; }

  var btn = document.getElementById('prac-res-save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    if (editId) {
      await api.call('updatePracticeEntry', editId, { name: name, track: track, dueDate: due, notes: notes });
      showToast('Resource updated ✓');
    } else {
      await api.call('addPracticeResource', { name: name, track: track, dueDate: due, notes: notes });
      showToast('Resource added ✓');
    }
    closeModals();
    _pracLoaded = false;
    await pracLoad();
  } catch (e) {
    showToast('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = editId ? 'Save changes' : 'Add resource';
  }
}

// ── Edit resource (opens modal pre-filled) ────────────────────────────────────
function pracEditResource(resId) {
  var res = _pracData.find(function(r) { return r.id === resId; });
  if (!res) return;

  document.getElementById('prac-res-edit-id').value = res.id;
  document.getElementById('prac-res-name').value    = res.name;
  document.getElementById('prac-res-track').value   = res.track;
  document.getElementById('prac-res-due').value     = res.dueDate || '';
  document.getElementById('prac-res-notes').value   = res.notes || '';
  document.getElementById('prac-res-modal-title').textContent = 'Edit resource';
  document.getElementById('prac-res-save-btn').textContent    = 'Save changes';
  openModal('modal-prac-resource');
}

// ── Delete resource ───────────────────────────────────────────────────────────
async function pracDeleteResource(resId, name) {
  if (!confirm('Delete "' + name + '" and all its items?')) return;
  try {
    await api.call('deletePracticeEntry', resId);
    showToast('Deleted ✓');
    _pracLoaded = false;
    await pracLoad();
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

// ── Batch add items ───────────────────────────────────────────────────────────
function pracOpenBatchAdd(resId, resName) {
  _pracBatchParent = resId;
  document.getElementById('prac-items-parent-lbl').textContent = 'to: ' + resName;
  document.getElementById('prac-items-text').value = '';
  document.getElementById('prac-items-due').value  = '';
  openModal('modal-prac-items');
  setTimeout(function() { document.getElementById('prac-items-text').focus(); }, 100);
}

async function pracSaveItemsBatch() {
  var text = document.getElementById('prac-items-text').value;
  var due  = document.getElementById('prac-items-due').value;
  var names = text.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);

  if (names.length === 0) { showToast('Enter at least one item'); return; }

  var dueDates = due ? names.map(function() { return due; }) : null;

  try {
    var res = await api.call('addPracticeItemsBatch', {
      parentId: _pracBatchParent,
      names: names,
      dueDates: dueDates
    });
    showToast(res.count + ' items added ✓');
    closeModals();
    _pracLoaded = false;
    await pracLoad();
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

// ── Inline add (single item, quick) ──────────────────────────────────────────
function pracStartInlineAdd(btn, resId) {
  var row = btn.parentElement;
  row.innerHTML =
    '<div class="prac-inline-add">' +
    '<input type="text" id="prac-inline-name" placeholder="Item name" autofocus>' +
    '<input type="date" id="prac-inline-due">' +
    '<button class="btn btn--primary btn--sm" onclick="pracInlineSave(\'' + resId + '\')">Add</button>' +
    '<button class="btn btn--ghost btn--sm" onclick="pracLoad()">✕</button>' +
    '</div>';
  setTimeout(function() {
    var inp = document.getElementById('prac-inline-name');
    if (inp) inp.focus();
    // Enter key support
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') pracInlineSave(resId);
    });
  }, 50);
}

async function pracInlineSave(resId) {
  var name = document.getElementById('prac-inline-name').value.trim();
  var due  = document.getElementById('prac-inline-due').value;
  if (!name) { showToast('Name is required'); return; }

  try {
    await api.call('addPracticeItem', { parentId: resId, name: name, dueDate: due });
    showToast('Item added ✓');
    _pracLoaded = false;
    await pracLoad();
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

// ── Edit item modal ───────────────────────────────────────────────────────────
function pracOpenEditItem(itemId) {
  var item = null;
  _pracData.forEach(function(res) {
    (res.items || []).forEach(function(it) {
      if (it.id === itemId) item = it;
    });
  });
  if (!item) return;

  document.getElementById('prac-edit-item-id').value    = item.id;
  document.getElementById('prac-edit-item-name').value  = item.name;
  document.getElementById('prac-edit-item-due').value   = item.dueDate || '';
  document.getElementById('prac-edit-item-notes').value = item.notes || '';
  openModal('modal-prac-edit-item');
}

async function pracSaveItemEdit() {
  var id    = document.getElementById('prac-edit-item-id').value;
  var name  = document.getElementById('prac-edit-item-name').value.trim();
  var due   = document.getElementById('prac-edit-item-due').value;

  if (!name) { showToast('Name is required'); return; }

  try {

    closeModals();
    _pracLoaded = false;
    await pracLoad();
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

async function pracDeleteItem() {
  var id = document.getElementById('prac-edit-item-id').value;
  if (!confirm('Delete this item?')) return;
  try {
    await api.call('deletePracticeEntry', id);
    showToast('Deleted ✓');
    closeModals();
    _pracLoaded = false;
    await pracLoad();
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function _pracDueClass(dateStr) {
  if (!dateStr) return 'none';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return 'none';
  var today = new Date(); today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return d < today ? 'overdue' : 'upcoming';
}

function _pracFmtDue(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  var today = new Date(); today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  var diff = Math.round((d - today) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff === -1) return 'yesterday';
  if (diff < -1) return Math.abs(diff) + 'd overdue';
  if (diff <= 7) return 'in ' + diff + 'd';
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
